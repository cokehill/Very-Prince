apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: very-prince-pg
  namespace: data
spec:
  instances: 3
  primaryUpdateStrategy: unsupervised

  storage:
    size: 20Gi
    storageClass: gp3

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"

  backup:
    barmanObjectStore:
      destinationPath: "s3://very-prince-pg-backups/"
      endpointURL: "https://minio.very-prince.internal"
      s3Credentials:
        accessKeyId:
          name: pg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-credentials
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: "30d"

  monitoring:
    enablePodMonitor: true